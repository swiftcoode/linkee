<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>linkee.at</title>
  <style>
    body { background: #111113; font-family: system-ui, sans-serif; color: #ddd; padding: 2rem 1.5rem; }
    .header { margin-bottom: 2rem; }
    .search-bar { display: flex; align-items: center; gap: 8px; background: #1a1a1c; border: 0.5px solid #2e2e30; border-radius: 10px; padding: 8px 12px; margin-bottom: 1.5rem; }
    .search-bar input { background: none; border: none; outline: none; color: #ccc; width: 100%; }
    .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: #555; text-transform: uppercase; margin: 20px 0 10px 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .card { background: #1a1a1c; border: 0.5px solid #2e2e30; border-radius: 12px; padding: 1rem; text-decoration: none; display: flex; flex-direction: column; gap: 10px; }
    .card:hover { background: #202024; }
    .icon-wrap { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .card-name { font-size: 14px; font-weight: 500; color: #ddd; }
    .card-desc { font-size: 12px; color: #666; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🔗 Linkee.at</h1>
    <p>Accès aux ressources technologique</p>
  </div>

  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher..." oninput="render()" />
  </div>

  <div id="app"></div>

  <script>
    // === LISTE DES LIENS (N'oubliez pas la virgule après chaque ligne sauf la dernière) ===
    const data = [
      { section: "NIVEAUX", name: "QUATRIEME", desc: "Moteur de recherche", url: "https://google.com", color: "#1e3a5f", icon: "🌐" },
      { section: "NIVEAUX", name: "TROISIEME", desc: "Moteur de recherche", url: "https://google.com", color: "#1e3a5f", icon: "🌐" },
      { section: "Programmation et Simulation", name: "Scratch", desc: "Programmation", url: "https://scratch.mit.edu/projects/editor/?tutorial=getStarted", color: "#1a2e1a", icon: "✅" },
      { section: "Programmation et Simulation", name: "Vittasciences", desc: "Programmation et Simulation", url: "https://vittascience.com", color: "#1a2e3a", icon: "🧩" },
      { section: "Programmation et Simulation", name: "CitizenCode", desc: "Programmation", url: "https://tinkercad.com", color: "#1a2e3a", icon: "🧩" },
      { section: "Programmation et Simulation", name: "Tinkercad", desc: "Modélisation 3D", url: "https://tinkercad.com", color: "#1a2e3a", icon: "🧩" },
      { section: "Exercices", name: "LearningApps", desc: "Exercices interactifs", url: "https://learningapps.org", color: "#3a2a1a", icon: "📝" },
      { section: "Logiciels", name: "VS Code", desc: "Éditeur de code", url: "https://code.visualstudio.com", color: "#007acc", icon: "💻" },
      { section: "Niveau 3ème", name: "VS Code", desc: "Éditeur de code", url: "https://code.visualstudio.com", color: "#007acc", icon: "💻" },
      { section: "Niveau 4ème", name: "VS Code", desc: "Éditeur de code", url: "https://code.visualstudio.com", color: "#007acc", icon: "💻" },
      { section: "Outils", name: "Draw.io", desc: "Éditeur de code", url: "https://code.visualstudio.com", color: "#007acc", icon: "💻" },
      { section: "Outils", name: "Draw.io", desc: "Éditeur de code", url: "https://code.visualstudio.com", color: "#007acc", icon: "💻" }
    ];

    function render() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const app = document.getElementById('app');
      app.innerHTML = "";

      const sections = [...new Set(data.map(item => item.section))];

      sections.forEach(secName => {
        const filtered = data.filter(d => d.section === secName && d.name.toLowerCase().includes(query));
        if (filtered.length === 0) return;

        app.innerHTML += `<div class="section-label">${secName}</div><div class="grid"></div>`;
        const grids = app.querySelectorAll('.grid');
        const currentGrid = grids[grids.length - 1];

        filtered.forEach(item => {
          currentGrid.innerHTML += `
            <a class="card" href="${item.url}" target="_blank">
              <div class="icon-wrap" style="background:${item.color}">${item.icon}</div>
              <div>
                <div class="card-name">${item.name}</div>
                <div class="card-desc">${item.desc}</div>
              </div>
            </a>`;
        });
      });
    }

    render();
  </script>
</body>
</html>
